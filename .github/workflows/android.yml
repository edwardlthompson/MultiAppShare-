name: Android CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean Project
      run: ./gradlew clean

    - name: Run Static Analysis (Lint)
      run: ./gradlew lintDebug

    - name: Run Database Tests
      run: ./gradlew :core-database:testDebugUnitTest

    - name: Run Domain Tests
      run: ./gradlew :core-domain:testDebugUnitTest

    - name: Run Dashboard Tests
      run: ./gradlew :feature-dashboard:testDebugUnitTest

    - name: Build Application Release APK
      run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/release/*.apk
          .github/assets/icon.png
        generate_release_notes: true
